#==========================================
# Jason 自用 Clash 配置（Android / PC 通用）
#==========================================

# HTTP 代理端口
port: 7890

# Socks5 代理端口
socks-port: 7891

# Redir 透明代理端口（Linux/macOS 常用）
redir-port: 7892

# 混合端口（HTTP + Socks）
mixed-port: 7893

# 允许局域网设备连接
allow-lan: true

# 绑定所有网卡
bind-address: "*"

# 规则模式（按 rules 分流）
mode: rule

# 日志等级
log-level: info

# 是否启用 IPv6
ipv6: false

# Clash 外部控制 API
external-controller: 127.0.0.1:9090

#================ DNS 配置 ================

dns:

  # 开启 Clash DNS
  enable: true

  # DNS 不使用 IPv6
  ipv6: false

  # DNS 监听端口
  listen: 0.0.0.0:53

  # fake-ip 模式（推荐）
  enhanced-mode: fake-ip

  # fake-ip 地址池
  fake-ip-range: 198.18.0.1/16

  # 以下域名不使用 fake-ip
  fake-ip-filter:

    # 局域网
    - "*.lan"

    # QQ 登录
    - localhost.ptlogin2.qq.com

    # Nintendo
    - +.srv.nintendo.net

    # PSN
    - +.stun.playstation.net

    # Xbox
    - +.xboxlive.com

    # Windows 网络检测
    - +.msftconnecttest.com
    - +.msftncsi.com

    # Xbox 微软域名
    - xbox.*.microsoft.com

    # 暴雪
    - "*.battlenet.com"
    - "*.battle.net"

  # 国内 DNS
  nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 国外 DoH DNS
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query

  # fallback 过滤
  fallback-filter:

    # 国内 IP 不走 fallback
    geoip: true

    # 中国 GEOIP
    geoip-code: CN

#================ Sniffer 配置 ================

sniffer:

  # 开启流量嗅探
  enable: true

  sniff:

    # HTTP 流量嗅探
    HTTP:

      # 嗅探端口
      ports:
        - 80
        - 8080-8880

    # HTTPS/TLS 流量嗅探
    TLS:

      # TLS 端口
      ports:
        - 443
        - 8443

#================ YAML 锚点 ================

# 主策略组模板
pr: &a3
  type: select
  proxies:
    - ♻️ 自动选择
    - 🇭🇰 香港节点
    - 🇺🇲 美国节点
    - 🇯🇵 日本节点
    - 🇨🇳 台湾节点
    - DIRECT

# Provider 基础模板
p: &a1
  type: http
  interval: 86400

  health-check:

    # 开启健康检查
    enable: true

    # 测速 URL
    url: http://www.gstatic.com/generate_204

    # 检测时间
    interval: 1800

# 自动测速模板
auto: &a4

  # url-test 自动测速
  type: url-test

  # 懒加载测速
  lazy: true

  # 测速地址
  url: http://www.gstatic.com/generate_204

  # 测速间隔
  interval: 900

  # 使用哪个 provider
  use:
    - Sub

# 手动选择模板
use: &a2
  type: select
  use:
    - Sub

# classical 规则模板
c: &a6
  type: http
  behavior: classical
  interval: 86400

# domain 规则模板
d: &a5
  type: http
  behavior: domain
  interval: 86400

# ipcidr 规则模板
i: &a7
  type: http
  behavior: ipcidr
  interval: 86400

#================ 节点订阅 ================

proxy-providers:

  Sub:

    # 引用 provider 模板
    <<: *a1

    # 机场订阅链接
    url: "https://liangxin.xyz/api/v1/liangxin?OwO=1d5b8d8909c277c53a418da6802516d3"

    # 本地缓存路径
    path: ./proxy_providers/sub.yaml

# 不手动写死节点
proxies: null

#================ 策略组 ================

proxy-groups:

#============ 主策略 ============

  # 手动节点切换
  - name: 🚀 手动切换
    <<: *a2

  # 全局国外服务
  - name: 🌍 国外服务
    type: select
    proxies:
      - ♻️ 自动选择
      - 🇭🇰 香港节点
      - 🇺🇲 美国节点
      - 🇯🇵 日本节点
      - 🇨🇳 台湾节点
      - DIRECT

#============ AI ============

  # AI 总策略组
  - name: 🤖 AI服务
    type: select
    proxies:
      - 🇺🇲 美国节点
      - 🇭🇰 香港节点

  # OpenAI
  - name: 🤖 OpenAI
    type: select
    proxies:
      - 🇺🇲 美国节点

  # Gemini
  - name: 🤖 Gemini
    type: select
    proxies:
      - 🇺🇲 美国节点

  # Claude
  - name: 🤖 Claude
    type: select
    proxies:
      - 🇺🇲 美国节点

#============ 交易所 ============

  # OKX 固定台湾
  - name: 💰 OKX
    type: select
    proxies:
      - 🇨🇳 台湾节点

  # Binance 直连
  - name: 💰 Binance
    type: select
    proxies:
      - DIRECT

#============ 社交 ============

  # X / XChat 固定香港
  - name: 🐦 X服务
    type: select
    proxies:
      - 🇭🇰 香港节点

  # Telegram 香港优先
  - name: 📟 Telegram
    type: select
    proxies:
      - 🇭🇰 香港节点
      - ♻️ 自动选择

#============ 视频 ============

  # YouTube
  - name: 📺 YouTube
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 🇺🇲 美国节点

  # 国外媒体
  - name: 🎬 国际媒体
    type: select
    proxies:
      - 🇺🇲 美国节点
      - 🇭🇰 香港节点

#============ 设计 ============

  # Behance 走日本
  - name: 🎨 Behance
    type: select
    proxies:
      - 🇯🇵 日本节点

#============ 苹果服务 ============

  # 苹果服务
  - name: 🍎 苹果服务
    type: select
    proxies:
      - DIRECT
      - 🇭🇰 香港节点

#============ 广告 ============

  # 广告拦截
  - name: 🆎 AdBlock
    type: select
    proxies:
      - REJECT

#============ 漏网 ============

  # 未匹配规则流量
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - ♻️ 自动选择
      - 🇭🇰 香港节点
      - 🇺🇲 美国节点
      - DIRECT

#============ 节点组 ============

  # 自动测速节点
  - name: ♻️ 自动选择
    <<: *a4

  # 香港节点筛选
  - name: 🇭🇰 香港节点
    <<: *a4
    filter: "港|HK|(?i)Hong"

  # 日本节点筛选
  - name: 🇯🇵 日本节点
    <<: *a4
    filter: "日|JP|(?i)Japan|Tokyo"

  # 台湾节点筛选
  - name: 🇨🇳 台湾节点
    <<: *a4
    filter: "台|TW|(?i)Taiwan"

  # 美国节点筛选
  - name: 🇺🇲 美国节点
    <<: *a4
    filter: "美|US|(?i)States|America"

#================ Rule Provider ================

