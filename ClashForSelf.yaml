#==========================================
# @ConfigName        Jason 极简基础配置
# @UpdateTime        2026/05/03
#==========================================

# 端口设置
port: 7890
socks-port: 7891
mixed-port: 7893
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090

# DNS 设置
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query

# 订阅链接
proxy-providers:
  Sub:
    type: http
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 1800
    url: https://liangxin.xyz/api/v1/liangxin?OwO=1d5b8d8909c277c53a418da6802516d3
    path: ./proxy_providers/sub.yaml

proxies: null

proxy-groups:
  # 手动切换：从所有订阅节点中任选一个
  - name: 🚀 手动切换
    type: select
    use:
      - Sub
  # 自动测速：自动选延迟最低的节点
  - name: ♻️ 自动选择
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use:
      - Sub
  # 地区分组（自动测速）
  - name: 🇭🇰 香港节点
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use:
      - Sub
    filter: "港|HK|(?i)Hong"
  - name: 🇯🇵 日本节点
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use:
      - Sub
    filter: "日|东京|JP|(?i)Japan"
  - name: 🇨🇳 台湾节点
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use:
      - Sub
    filter: "台|湾|TW|(?i)Taiwan"
  - name: 🇺🇲 美国节点
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use:
      - Sub
    filter: "美|US|(?i)States|American"
  - name: 🇸🇬 狮城节点
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use:
      - Sub
    filter: "新|坡|SG|(?i)Singapore"
  # 兜底分流：默认走自动选择
  - name: 🐟 兜底分流
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 手动切换
      - DIRECT

# 最简规则：全部未匹配流量走兜底分流（相当于全局代理）
rules:
  - MATCH,🐟 兜底分流