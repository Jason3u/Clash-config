#==========================================
# @ConfigName        Jason 自用完整分流配置
# @UpdateTime        2026/05/18/1:15
#==========================================

# 端口
port: 7890
socks-port: 7891
mixed-port: 7893
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090

# DNS
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query

# 机场订阅（替换为你自己的链接）
proxy-providers:
  Sub:
    type: http
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 1800
    url: https://liangxin.xyz/api/v1/liangxin?OwO=1d5b8d8909c277c53a418da6802516d3
    path: ./proxy_providers/sub.yaml

proxies: null

# 策略组
proxy-groups:
  # ---- 分流策略组 ----
  - name: 🚀 手动切换
    type: select
    use: [Sub]
  - name: 🌏 全球加速
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 手动切换
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - DIRECT
  - name: 🍎 苹果服务
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 手动切换
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - DIRECT
  - name: 📺 哔哩哔哩
    type: select
    proxies:
      - DIRECT
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
  - name: 🤖 OpenAi
    type: select
    proxies:
      - 🇺🇲 美国节点
  - name: 🤖 Gemini
    type: select
    proxies:
      - 🇨🇳 台湾节点
  - name: 🤖 Claude
    type: select
    proxies:
      - 🇺🇲 美国节点
  - name: 🖥 Behance
    type: select
    proxies:
      - 🇯🇵 日本节点
  - name: 👥 社交网络
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 🇺🇸 美国节点
      - 🚀 手动切换
  - name: 🇨🇳 金融专用
    type: select
    proxies:
      - 🇨🇳 台湾节点
  - name: 🎬 国际媒体
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 手动切换
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - DIRECT
  - name: 🌌 谷歌服务
    type: select
    proxies:
      - 🇭🇰 香港节点
      - ♻️ 自动选择
      - 🚀 手动切换
  - name: 📟 电报消息
    type: select
    proxies:
      - 🇭🇰 香港节点
      - ♻️ 自动选择
      - 🚀 手动切换
  - name: 🐦 推特服务
    type: select
    proxies:
      - 🇭🇰 香港节点
  - name: 🎮 游戏平台
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 手动切换
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - DIRECT
  - name: 🐟 兜底分流
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 手动切换
      - DIRECT

  # ---- 节点分组（自动测速） ----
  - name: ♻️ 自动选择
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [Sub]
  - name: 🇭🇰 香港节点
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [Sub]
    filter: "港|HK|(?i)Hong"
  - name: 🇯🇵 日本节点
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [Sub]
    filter: "日|东京|JP|(?i)Japan"
  - name: 🇨🇳 台湾节点
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [Sub]
    filter: "台|湾|TW|(?i)Taiwan"
  - name: 🇺🇲 美国节点
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [Sub]
    filter: "美|US|(?i)States|American"
  - name: 🇸🇬 狮城节点
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [Sub]
    filter: "新|坡|SG|(?i)Singapore"

