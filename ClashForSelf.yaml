#==========================================
# @ConfigName        Jason自用Clash配置文件
# @Author            @Jason3u
# @TgChannel         https://t.me/+y4QfC46XndVkMGI9
# @UpdateTime        2026/05/03
# @Function          支持手动选择、自动测速、兜底分流、按国家分组节点、多机场订阅等
# @ClashVerge        https://github.com/clash-verge-rev/clash-verge-rev/releases
# @ConfigVersion     1.0
#==========================================

port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - localhost.ptlogin2.qq.com
    - +.srv.nintendo.net
    - +.stun.playstation.net
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.xboxlive.com
    - msftconnecttest.com
    - xbox.*.microsoft.com
    - "*.battlenet.com.cn"
    - "*.battlenet.com"
    - "*.blzstatic.cn"
    - "*.battle.net"
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
    - https://dns.alidns.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

proxy-providers:
  Sub:
    type: http
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 1800
    url: https://liangxin.xyz/api/v1/liangxin?OwO=1d5b8d8909c277c53a418da6802516d3
    path: ./proxy_providers/sub.yaml

proxies: null

proxy-groups:
  # 手动切换节点（从所有订阅节点中选）
  - name: 🚀 手动切换
    type: select
    use:
      - Sub
  # 通用全球加速
  - name: 🌏 全球加速
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 手动切换
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - DIRECT
  # 苹果服务
  - name: 🍎 苹果服务
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 手动切换
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - DIRECT
  # 哔哩哔哩（港澳台番剧可选香港/台湾）
  - name: 📺 哔哩哔哩
    type: select
    proxies:
      - DIRECT
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
  # ChatGPT 仅美国
  - name: 🤖 OpenAi
    type: select
    proxies:
      - 🇺🇲 美国节点
  # Gemini 台湾节点
  - name: 🤖 Gemini
    type: select
    proxies:
      - 🇨🇳 台湾节点
  ## Claude 暂时注释，待补规则 URL 后取消注释
  # - name: 🤖 Claude
  #   type: select
  #   proxies:
  #     - 🇺🇲 美国节点
  ## Behance 暂时注释
  # - name: 🖥 Behance
  #   type: select
  #   proxies:
  #     - 🇯🇵 日本节点
  ## 社交网络合集暂时注释
  # - name: 👥 社交网络
  #   type: select
  #   proxies:
  #     - 🇭🇰 香港节点
  #     - 🇺🇸 美国节点
  #     - 🚀 手动切换
  # OKX 走台湾
  - name: 🇨🇳 金融专用
    type: select
    proxies:
      - 🇨🇳 台湾节点
  # 国际媒体
  - name: 🎬 国际媒体
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 手动切换
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - DIRECT
  # 谷歌服务（YouTube 等）
  - name: 🌌 谷歌服务
    type: select
    proxies:
      - 🇭🇰 香港节点
      - ♻️ 自动选择
      - 🚀 手动切换
  # Telegram
  - name: 📟 电报消息
    type: select
    proxies:
      - 🇭🇰 香港节点
      - ♻️ 自动选择
      - 🚀 手动切换
  # Twitter 强制香港
  - name: 🐦 推特服务
    type: select
    proxies:
      - 🇭🇰 香港节点
  # 游戏平台
  - name: 🎮 游戏平台
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 手动切换
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - DIRECT
  # 兜底分流
  - name: 🐟 兜底分流
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 手动切换
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - DIRECT

  # --- 节点分组（自动测速）---
  - name: ♻️ 自动选择
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use:
      - Sub
  - name: 🇭🇰 香港节点
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use:
      - Sub
    filter: "港|HK|(?i)Hong"
  - name: 🇯🇵 日本节点
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use:
      - Sub
    filter: "日|东京|JP|(?i)Japan"
  - name: 🇨🇳 台湾节点
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use:
      - Sub
    filter: "台|湾|TW|(?i)Taiwan"
  - name: 🇺🇲 美国节点
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use:
      - Sub
    filter: "美|US|(?i)States|American"
  - name: 🇸🇬 狮城节点
    type: url-test
    lazy: true
    url: http://www.gstatic.com/generate_204
    interval: 900
    use:
      - Sub
    filter: "新|坡|SG|(?i)Singapore"

